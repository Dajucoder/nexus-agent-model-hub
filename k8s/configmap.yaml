apiVersion: v1
kind: ConfigMap
metadata:
  name: nexus-agent-model-hub-config
  namespace: nexus-agent-model-hub
data:
  APP_PORT: "4000"
  CORS_ORIGIN: "https://nexus.example.com"
  NEXT_PUBLIC_API_URL: "https://api.nexus.example.com/api/v1"
  NEXT_PUBLIC_DEFAULT_LOCALE: "zh-CN"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX: "200"
  AUTH_RATE_LIMIT_MAX: "20"
  AGENT_RATE_LIMIT_WINDOW_MS: "60000"
  AGENT_RATE_LIMIT_MAX: "30"
