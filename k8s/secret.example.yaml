apiVersion: v1
kind: Secret
metadata:
  name: nexus-agent-model-hub-secrets
  namespace: nexus-agent-model-hub
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:password@postgres:5432/nexus_agent_model_hub"
  REDIS_URL: "redis://redis:6379"
  JWT_SECRET: "replace-with-production-secret"
  JWT_REFRESH_SECRET: "replace-with-production-refresh-secret"
  PROVIDER_CONFIG_SECRET: "replace-with-production-provider-secret"
