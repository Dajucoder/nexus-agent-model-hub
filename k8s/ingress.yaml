apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-agent-model-hub
  namespace: nexus-agent-model-hub
spec:
  rules:
    - host: nexus.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-agent-model-hub-frontend
                port:
                  number: 3000
    - host: api.nexus.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-agent-model-hub-backend
                port:
                  number: 4000
