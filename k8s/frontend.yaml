apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-agent-model-hub-frontend
  namespace: nexus-agent-model-hub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexus-agent-model-hub-frontend
  template:
    metadata:
      labels:
        app: nexus-agent-model-hub-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/example/nexus-agent-model-hub-frontend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: nexus-agent-model-hub-config
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-agent-model-hub-frontend
  namespace: nexus-agent-model-hub
spec:
  selector:
    app: nexus-agent-model-hub-frontend
  ports:
    - port: 3000
      targetPort: 3000
