apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-agent-model-hub-backend
  namespace: nexus-agent-model-hub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexus-agent-model-hub-backend
  template:
    metadata:
      labels:
        app: nexus-agent-model-hub-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/example/nexus-agent-model-hub-backend:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: nexus-agent-model-hub-config
            - secretRef:
                name: nexus-agent-model-hub-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-agent-model-hub-backend
  namespace: nexus-agent-model-hub
spec:
  selector:
    app: nexus-agent-model-hub-backend
  ports:
    - port: 4000
      targetPort: 4000
