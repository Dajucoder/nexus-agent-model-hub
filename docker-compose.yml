name: nexus-agent-model-hub

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus_secret}
      POSTGRES_DB: ${POSTGRES_DB:-nexus_agent_model_hub}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-nexus_agent_model_hub}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nexus

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - nexus

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        NPM_REGISTRY: https://mirrors.tuna.tsinghua.edu.cn/npm/
        DEBIAN_MIRROR: http://mirrors.tuna.tsinghua.edu.cn
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_NAME: ${APP_NAME:-Nexus Agent Model Hub}
      APP_VERSION: ${APP_VERSION:-0.2.0}
      APP_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus_secret}@postgres:5432/${POSTGRES_DB:-nexus_agent_model_hub}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-string-at-least-64-characters-long-1234567890}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-to-another-random-string-at-least-64-characters-long}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-pretty}
      AGENT_TIMEOUT_MS: ${AGENT_TIMEOUT_MS:-30000}
      AGENT_MAX_RETRIES: ${AGENT_MAX_RETRIES:-2}
      AGENT_CONCURRENCY_LIMIT: ${AGENT_CONCURRENCY_LIMIT:-8}
      AGENT_PLUGIN_PATHS: ${AGENT_PLUGIN_PATHS:-}
      AGENT_HTTP_ALLOWED_HOSTS: ${AGENT_HTTP_ALLOWED_HOSTS:-api.github.com,httpbin.org}
      PROVIDER_CONFIG_SECRET: ${PROVIDER_CONFIG_SECRET:-}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-200}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-20}
      AGENT_RATE_LIMIT_WINDOW_MS: ${AGENT_RATE_LIMIT_WINDOW_MS:-60000}
      AGENT_RATE_LIMIT_MAX: ${AGENT_RATE_LIMIT_MAX:-30}
    ports:
      - "${APP_PORT:-4000}:4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/v1/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        NPM_REGISTRY: https://mirrors.tuna.tsinghua.edu.cn/npm/
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${APP_PORT:-4000}/api/v1
      NEXT_PUBLIC_DEFAULT_LOCALE: ${NEXT_PUBLIC_DEFAULT_LOCALE:-zh-CN}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Nexus Agent Model Hub}
      PROVIDER_CONFIG_SECRET: ${PROVIDER_CONFIG_SECRET:-}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - nexus

volumes:
  postgres-data:
  redis-data:

networks:
  nexus:
    driver: bridge
