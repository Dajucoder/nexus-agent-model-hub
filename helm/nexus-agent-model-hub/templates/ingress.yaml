{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-agent-model-hub
  namespace: {{ .Values.namespace }}
spec:
  rules:
    - host: {{ .Values.ingress.frontendHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-agent-model-hub-frontend
                port:
                  number: {{ .Values.frontend.servicePort }}
    - host: {{ .Values.ingress.apiHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-agent-model-hub-backend
                port:
                  number: {{ .Values.backend.servicePort }}
{{- end }}
