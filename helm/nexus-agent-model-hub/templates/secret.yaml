apiVersion: v1
kind: Secret
metadata:
  name: nexus-agent-model-hub-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.DATABASE_URL | quote }}
  REDIS_URL: {{ .Values.secrets.REDIS_URL | quote }}
  JWT_SECRET: {{ .Values.secrets.JWT_SECRET | quote }}
  JWT_REFRESH_SECRET: {{ .Values.secrets.JWT_REFRESH_SECRET | quote }}
